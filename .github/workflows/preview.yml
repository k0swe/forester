name: Deploy Preview Channel

on:
  pull_request:
    branches: ['main']
    types: [opened, synchronize, reopened]

permissions:
  checks: write
  contents: read
  pull-requests: write

env:
  FIREBASE_PROJECT_ID: k0swe-kellog

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-web:
    uses: k0swe/forester/.github/workflows/test-web.yml@main

  deploy-preview:
    name: Deploy to Firebase Hosting Preview Channel
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork == false
    needs: test-web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read cached build artifacts
        uses: actions/cache@v5
        env:
          cache-name: cache-web-build-artifacts
        with:
          path: web/dist/
          key: ${{ runner.os }}-${{ env.cache-name }}-${{ github.sha }}

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 7d
