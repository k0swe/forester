name: Deploy Preview Channel

on:
  pull_request:
    branches: ['main']
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-web:
    uses: k0swe/forester/.github/workflows/test-web.yml@main

  deploy-preview:
    name: Deploy to Firebase Hosting Preview Channel
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork == false
    needs: test-web
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup Firebase CLI
        run: npm i -g firebase-tools

      - name: Read cached build artifacts
        uses: actions/cache@v5
        env:
          cache-name: cache-web-build-artifacts
        with:
          path: web/dist/
          key: ${{ runner.os }}-${{ env.cache-name }}-${{ github.sha }}

      - name: Deploy preview channel
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx firebase hosting:channel:deploy "pr-${{ github.event.pull_request.number }}" \
            --project k0swe-kellog \
            --expires 7d \
            --token "$FIREBASE_TOKEN"
